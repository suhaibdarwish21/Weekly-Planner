<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Planner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark custom-nav fixed-top">

  <div class="container">

    <a class="navbar-brand d-flex align-items-center gap-3" href="#">

      <img src="images/logo.png" alt="logo">

      <div>
        <h4 class="m-0 logo-title">Weekly Planner</h4>
        <small>Plan smart. Shop easy.</small>
      </div>

    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navMenu">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navMenu">

      <ul class="navbar-nav mx-auto gap-lg-4 text-center">

        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>

      </ul>

      <button class="my-list-btn">
        <i class="fa-solid fa-list"></i>
        My List
      </button>

    </div>

  </div>

</nav>


<!-- HERO -->
<section class="hero-section">

  <div class="hero-overlay"></div>

  <div class="container hero-content">

    <span class="badge-custom">

      <i class="fa-solid fa-star"></i>
      STAY ORGANIZED

    </span>

    <h1>
      Plan Your Week,<br>
      <span>Shop Smarter.</span>
    </h1>

    <p>
      Create your shopping list, set priorities and never forget the essentials again.
    </p>

  </div>

</section>


<!-- PRODUCTS -->
<section class="products-section">

  <div class="container">

    <!-- SORT BUTTON -->
    <div class="text-center mb-5">

      <button id="sortBtn" class="sort-btn">

        <i class="fa-solid fa-sliders"></i>
        Sort by Priority

      </button>

    </div>

    <!-- CARDS -->
    <div
      class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
      id="result">
    </div>

  </div>

</section>


<!-- FOOTER -->
<footer class="footer-section">

  <div class="social-icons">

    <a href="#"><i class="fa-brands fa-facebook"></i></a>

    <a href="#"><i class="fa-brands fa-github"></i></a>

    <a href="#"><i class="fa-brands fa-linkedin"></i></a>

    <a href="#"><i class="fa-brands fa-discord"></i></a>

    <a href="#"><i class="fa-brands fa-twitch"></i></a>

    <a href="#"><i class="fa-brands fa-reddit"></i></a>

  </div>

  <p>© 2025 CodeFactory. All rights reserved.</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/java.js"></script>

</body>
</html>
